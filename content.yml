global:
  header: "Consensus"

hero:
  eyebrow: "An interactive guide"
  headlineLine1: "How Blockchains"
  headlineLine2: "Agree"
  subhead: "Every blockchain makes a different bet on decentralization, security, and speed. Explore the consensus mechanisms that define them."
  cta: "Explore 10 mechanisms"

overview:
  trilemmaEyebrow: "The blockchain trilemma"
  trilemmaBody: |
    Every consensus algorithm is a bet: maximize **decentralization**, **security**, or **scalability** — but not all three at once. This site maps where each mechanism lands.
  stats:
    - value: "65%"
      label: "Energy Reduction"
      detail: "PoS systems use >99% less energy than PoW equivalents."
    - value: "<1s"
      label: "Sub-second Finality"
      detail: "Modern BFT consensus achieves instant settlement."
    - value: "10K+"
      label: "Active Nodes"
      detail: "Maximum decentralization requires high node participation."

grid:
  title: "The Mechanisms"
  description: "Ten distinct approaches to solving the Byzantine Generals Problem. Hover over any mechanism to see how it works under the hood."
  cta: "Read the full story"

detailPage:
  backLink: "All Algorithms"
  placeholderHeading: "Full breakdown coming soon"
  placeholderBody: "This space is reserved for the interactive mechanism diagram, visual timeline, and deep-dive explanation."
  adoptersHeading: "Notable Adopters"
  exploreMoreHeading: "Explore more"

algorithms:
  - slug: "proof-of-work"
    name: "Proof of Work (PoW)"
    category: "Energy Intensive"
    icon: "Pickaxe"
    shortTagline: "The original consensus. Miners compete to solve cryptographic puzzles."
    hoverDescription: "Nodes (miners) expend computational energy to find a hash below a target difficulty. The longest chain becomes the canonical truth, securing the network through pure thermodynamic cost."
    adopters: "Bitcoin, Dogecoin, Litecoin"
  - slug: "proof-of-stake"
    name: "Proof of Stake (PoS)"
    category: "Capital Secured"
    icon: "Coins"
    shortTagline: "Validators lock up capital as collateral instead of burning energy."
    hoverDescription: "Participants deposit native tokens into a smart contract to become validators. They are pseudo-randomly selected to propose and attest to blocks. Malicious behavior results in the 'slashing' (destruction) of their staked capital."
    adopters: "Ethereum, Cardano, Polkadot"
  - slug: "delegated-proof-of-stake"
    name: "Delegated PoS (DPoS)"
    category: "High Throughput"
    icon: "Users"
    shortTagline: "A representative democracy where token holders vote for a small set of delegates."
    hoverDescription: "To maximize speed, only a fixed number of validators (e.g., 21 in EOS) are permitted to produce blocks. Token holders use their stake to elect these active delegates, allowing for massive transaction throughput at the cost of decentralization."
    adopters: "EOS, Tron, BitShares"
  - slug: "pbft"
    name: "Practical Byzantine Fault Tolerance"
    category: "Permissioned"
    icon: "ShieldCheck"
    shortTagline: "A classic computer science algorithm adapted for enterprise blockchains."
    hoverDescription: "A state machine replication algorithm that tolerates up to 1/3 of nodes acting maliciously. It requires intense peer-to-peer communication (O(n²)), meaning it only scales to a few dozen known nodes, but provides absolute finality."
    adopters: "Hyperledger Fabric, Zilliqa (hybrid)"
  - slug: "avalanche-consensus"
    name: "Avalanche Consensus"
    category: "Fast Finality"
    icon: "Snowflake"
    shortTagline: "Nodes repeatedly sub-sample the network to build rapid statistical confidence."
    hoverDescription: "Instead of asking every node for agreement, a node asks a small, random subset. If the subset agrees, the node adopts that stance. This ripples through the network like an avalanche, reaching global consensus in milliseconds."
    adopters: "Avalanche (AVAX)"
  - slug: "proof-of-history"
    name: "Proof of History (PoH)"
    category: "High Throughput"
    icon: "Clock"
    shortTagline: "A cryptographic clock that proves time passed between two events."
    hoverDescription: "Uses a high-frequency Verifiable Delay Function (VDF) to create a historical record of events. Validators don't need to wait for network agreement on time, stripping out massive communication overhead and enabling extreme speeds."
    adopters: "Solana"
  - slug: "proof-of-authority"
    name: "Proof of Authority (PoA)"
    category: "Permissioned"
    icon: "Key"
    shortTagline: "Identity is the stake. Known entities are granted the right to validate."
    hoverDescription: "Validators are pre-approved entities (often companies or institutions) whose real-world reputation is at stake. Because trust is established off-chain, the network can process transactions incredibly fast with almost zero computational cost."
    adopters: "VeChain, Goerli Testnet"
  - slug: "proof-of-space"
    name: "Proof of Space and Time"
    category: "Energy Light"
    icon: "HardDrive"
    shortTagline: "Secures the network using unused hard drive capacity instead of compute."
    hoverDescription: "Farmers 'plot' cryptographic data on their hard drives. When a new block is needed, the network broadcasts a challenge, and the farmer with the closest matching plot wins. A secondary VDF (Proof of Time) prevents plotting attacks."
    adopters: "Chia Network"
  - slug: "tendermint-core"
    name: "Tendermint BFT"
    category: "Fast Finality"
    icon: "Network"
    shortTagline: "A deterministic, fast-finality engine powering the 'Internet of Blockchains'."
    hoverDescription: "A modified DPoS + PBFT hybrid where a known set of validators take turns proposing blocks. It guarantees absolute finality (no forks ever) as long as 2/3 of the voting power is honest. If a chain halts, it favors consistency over availability."
    adopters: "Cosmos, Celestia, Binance Chain"
  - slug: "proof-of-burn"
    name: "Proof of Burn (PoB)"
    category: "Energy Light"
    icon: "Flame"
    shortTagline: "Miners destroy cryptocurrency to earn the right to mine new blocks."
    hoverDescription: "Instead of investing in physical mining rigs (PoW), participants send coins to an unspendable address ('burning' them). This virtual mining rig grants them a proportional chance to mine the next block and earn rewards."
    adopters: "Slimcoin, Counterparty"
